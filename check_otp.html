<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>OTP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="images/logo.png" alt="Logo" height="100">
      </a>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">

          <li class="nav-item">
            <a class="nav-link" href="index.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="login.html">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="register.html">Register</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>




  <div class="card-center">
    <div class="card">
      <h1>Enter code</h1>
      <form class="px-5 py-3" onsubmit="event.preventDefault(); checkOtp();">
        <div class="mb-3">
          <label for="otp" class="form-label">Please enter your 6-digit code.</label>
          <input type="text" class="form-control" id="otp" placeholder="XXX XXX" maxlength="6">
        </div>
        <p id="otpMsg"></p>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>

      <hr>
      <div class="alert alert-warning mx-5" role="alert">
        An OTP is sent if account is valid.
      </div>
      <br>
    </div>
  </div>


  <script>
    async function checkOtp() {

      const email = localStorage.getItem("pendingEmail");
      const code = document.getElementById("otp").value;

      if (!email) {
        document.getElementById("otpMsg").innerText = "Please login first";
        window.location.href = "login.html";
        return;
      }

      const res = await fetch("http://localhost:5000/check_otp", { //send POST request to endpoint
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, code })
      });
      const data = await res.json();
      if (res.status === 413 || res.status === 429) {
        alert(data.message);
        return;
      }
      if (res.status === 200) { //if 200
        localStorage.setItem("token", data.token); //store jwt
        localStorage.removeItem("pendingEmail")
        window.location.href = "wm.html";
      } else {
        document.getElementById("otpMsg").innerText = data.message; //else print msg
      }
    }

  </script>
</body>

</html>
