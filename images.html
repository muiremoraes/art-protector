<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <link rel="stylesheet" href="style.css">

</head>

<body>



  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="images/logo.png" alt="Logo" height="100">
      </a>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="about.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="wm.html">Watermark</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="compare.html">Image comparison</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="images.html">Images</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="scan.html">Scan Results</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="fgsm.html">Art Protection</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" onclick="logout()">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <section>
      <h2>Upload Image</h2>
      <input type="file" id="fileInput"> <!--select image and send it-->
    </section>

    <p class="text-center" id="message"></p>

    <section>
      <h2>Scan Images</h2>
      <p>Reverse search to see if your has been reposted online / similar art style. One scan every 30 days.</p>
      <button id="scanBtn" class="btn btn-outline-primary">Scan</button>
    </section>


    <section>
      <h2>Gallery</h2>
      <div id="gallery" class="row"></div>
    </section>

  </div>

  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "login.html";


    document.getElementById("fileInput").addEventListener("change", async (e) => { //listens for file 
      const file = e.target.files[0];
      if (!file) return;

      const formData = new FormData(); //sends file 
      formData.append("file", file);

      const res = await fetch("http://localhost:5000/upload", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token
        },
        body: formData
      });

      const data = await res.json(); //returns hashed file
       if (res.status === 413 || res.status === 429) {
        alert(data.message);
        return;
      }

      if(!res.ok){
        document.getElementById("message").innerText = data.error;
        return;
      }
      
      document.getElementById("message").innerText="";
      loadImages();
    });


    document.getElementById("scanBtn").addEventListener("click", async () => {
      const res = await fetch("http://localhost:5000/scan", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token
        },
      });
      const data = await res.json();
       if (res.status === 413 || res.status === 429) {
        alert(data.message);
        return;
      }

      if (res.ok) {
        alert(data.message);
      } else {
        alert((data.error || "scan failed"))
      }
    })


    async function loadImages() {

      const res = await fetch("http://localhost:5000/user-images", {
        headers: {
          "Authorization": "Bearer " + token
        },
      });

      const data = await res.json();
      if (res.status === 413 || res.status === 429) {
        alert(data.message);
        return;
      }
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";

      data.images.forEach(img => {
        const div = document.createElement("div");
        div.className = "col-md-4 mb-4";

        div.innerHTML = `
      <img src="${img.url}" class="image-lib">
      <br>
      <button onclick="deleteImage(${img.id})"> Delete </button> 
      <br>
      `;

        gallery.appendChild(div);

      })
    }

    async function deleteImage(id) {
      await fetch(`http://localhost:5000/delete/${id}`, {
        method: "DELETE",
        headers: {
          "Authorization": "Bearer " + token
        }
      })
      loadImages();
    }



    function logout() {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }

    loadImages();
  </script>

</body>

</html>
