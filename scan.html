<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <link rel="stylesheet" href="style.css">

</head>

<body>



  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="images/logo.png" alt="Logo" height="100">
      </a>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="about.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="wm.html">Watermark</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="compare.html">Image comparison</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="images.html">Images</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="scan.html">Scan Results</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="fgsm.html">Art Protection</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" onclick="logout()">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <section>
      <h2>Scan Results</h2>
      <p>Matches found:</p>
    </section>

    <section>
      <div id="resultsList" class="row"></div>
    </section>

    <p class="text-center" id="message"></p>

  </div>


  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "login.html";



    async function loadResults() {

      const res = await fetch("http://localhost:5000/scan/results", {
        headers: {
          "Authorization": "Bearer " + token
        },
      });

      const data = await res.json();
      if (res.status === 413 || res.status === 429) {
        alert(data.message);
        return;
      }
      const scanlist = document.getElementById("resultsList");

      if (data.results.length === 0) {
        scanlist.innerHTML = "<p>No results yet. Please scan images</p>";
        return;
      }


      data.results.forEach(img => {
        const div = document.createElement("div");
        div.className = "col-md-4 mb-3";
        div.innerHTML = `
        <div class="card">
            <img src="${img.thumbnail_url}" class="card-img-top">
            <div class="card-body">
                <h6 class="card-title">${img.website_title || "Website Result"}</h6>
                <a href="${img.website_url}" class="btn btn-sm btn-primary" target="_blank">View Link</a>
                
            </div>
        </div>
        `;

        scanlist.appendChild(div);

      })
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }
    loadResults();
  </script>

</body>

</html>
